<VirtualHost *:80>

  ###################################
  # AXON IVY CLUSTER
  ###################################
  
  #route=1, route=2 sticky session
  #lbmethod=byrequests Round Robin
  #stickysession=ROUTEID keep the user always access in a server
  <Proxy "balancer://ivycluster">
    BalancerMember "http://ivy-1:8080" route=1
	BalancerMember "http://ivy-2:8080" route=2
	ProxySet lbmethod=byrequests
    ProxySet stickysession=ROUTEID
  </Proxy>
  
  ProxyRequests Off
  ProxyPreserveHost On 

  #set cookie for sticky routing
  #(another option would be instructing Apache to use an existing cookie, e.g. Axon Ivy session cookie)
  Header add Set-Cookie "ROUTEID=.%{BALANCER_WORKER_ROUTE}e; path=/" env=BALANCER_ROUTE_CHANGED
  
  ###################################
  # OPENSEARCH CLUSTER
  ###################################

  <Proxy "balancer://opensearchcluster">
    BalancerMember "http://opensearch-1:9200"
    BalancerMember "http://opensearch-2:9200"
    ProxySet lbmethod=byrequests
  </Proxy>
  
  ###################################
  # ROUTING
  ###################################
  
  # OpenSearch API
  ProxyPass "/opensearch" "balancer://opensearchcluster"
  ProxyPassReverse "/opensearch" "balancer://opensearchcluster"
  
  # Axon Ivy
  #do not proxy the balancer-manager 
  ProxyPass /balancer-manager !
  
  #pass anything else to Axon Ivy
  ProxyPass / balancer://ivycluster/
  
  ########################################
  # OPTIONAL BALANCER MANAGER
  ########################################
  
  <Location "/balancer-manager">
    SetHandler balancer-manager
  </Location>
</VirtualHost>
