<svg xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif" font-size="12" role="img" viewBox="0 0 900 620"><title>Ivy Scaling Architecture</title><desc>Architecture diagram showing user → Apache LB → Ivy cluster and OpenSearch cluster → HAProxy → 3-node Patroni PostgreSQL cluster with etcd</desc><defs><marker id="arr" markerHeight="8" markerWidth="8" orient="auto" refX="7" refY="3"><path fill="#888" d="M0,0 L0,6 L8,3 z"/></marker></defs><rect width="900" height="620" x="0" y="0" fill="#f8f9fa" rx="8"/><text x="14" y="22" fill="#999" font-size="10" font-weight="600" text-anchor="start">ENTRY</text><text x="200" y="22" fill="#999" font-size="10" font-weight="600" text-anchor="start">IVY-SCALING (red circle)</text><text x="560" y="22" fill="#999" font-size="10" font-weight="600" text-anchor="start">BACKEND SERVICES</text><line x1="170" x2="170" y1="30" y2="600" stroke="#ddd" stroke-dasharray="4 3" stroke-width="1"/><line x1="530" x2="530" y1="30" y2="600" stroke="#ddd" stroke-dasharray="4 3" stroke-width="1"/><circle cx="70" cy="280" r="22" fill="#e9ecef" stroke="#ccc" stroke-width="1.5"/><text x="70" y="275" fill="#333" font-size="18" text-anchor="middle">👤</text><text x="70" y="318" fill="#555" font-size="11" text-anchor="middle">User</text><line x1="93" x2="175" y1="280" y2="280" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/><text x="134" y="273" fill="#999" font-size="10" text-anchor="middle">:80</text><rect width="120" height="56" x="178" y="252" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5" rx="6"/><text x="238" y="274" fill="#1d4ed8" font-size="13" font-weight="700" text-anchor="middle">LB</text><text x="238" y="290" fill="#1d4ed8" font-size="10" text-anchor="middle">Apache httpd</text><text x="238" y="303" fill="#1d4ed8" font-size="9" text-anchor="middle">mod_proxy_balancer</text><ellipse cx="375" cy="280" fill="none" stroke="#ef4444" stroke-dasharray="6 3" stroke-width="2" opacity=".7" rx="135" ry="100"/><text x="375" y="165" fill="#ef4444" font-size="11" font-style="italic" text-anchor="middle">ivy-scaling</text><line x1="298" x2="340" y1="268" y2="238" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/><line x1="298" x2="340" y1="292" y2="322" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/><text x="310" y="285" fill="#999" font-size="9" text-anchor="middle">sticky</text><text x="310" y="295" fill="#999" font-size="9" text-anchor="middle">ROUTEID</text><rect width="112" height="48" x="342" y="210" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5" rx="6"/><text x="398" y="231" fill="#6d28d9" font-size="12" font-weight="700" text-anchor="middle">Axon Ivy 1</text><text x="398" y="249" fill="#6d28d9" font-size="10" text-anchor="middle">:8080 route=1</text><rect width="112" height="48" x="342" y="300" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5" rx="6"/><text x="398" y="321" fill="#6d28d9" font-size="12" font-weight="700" text-anchor="middle">Axon Ivy 2</text><text x="398" y="339" fill="#6d28d9" font-size="10" text-anchor="middle">:8080 route=2</text><line x1="454" x2="540" y1="234" y2="280" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/><line x1="454" x2="540" y1="324" y2="290" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/><line x1="238" x2="238" y1="252" y2="130" stroke="#3b82f6" stroke-dasharray="4 3" stroke-width="1.2"/><line x1="238" x2="596" y1="130" y2="130" stroke="#3b82f6" stroke-dasharray="4 3" stroke-width="1.2" marker-end="url(#arr)"/><text x="415" y="122" fill="#3b82f6" font-size="9" text-anchor="middle">/opensearch → round-robin</text><rect width="200" height="140" x="542" y="60" fill="#e9ecef" stroke="#ccc" stroke-width="1.5" rx="6"/><text x="642" y="82" fill="#333" font-size="12" font-weight="700" text-anchor="middle">OpenSearch Cluster</text><rect width="76" height="36" x="558" y="93" fill="#fde68a" stroke="#d97706" stroke-width="1.2" rx="4"/><text x="596" y="109" fill="#92400e" font-size="11" font-weight="700" text-anchor="middle">OS-1</text><text x="596" y="123" fill="#92400e" font-size="9" text-anchor="middle">:9201</text><rect width="76" height="36" x="650" y="93" fill="#fde68a" stroke="#d97706" stroke-width="1.2" rx="4"/><text x="688" y="109" fill="#92400e" font-size="11" font-weight="700" text-anchor="middle">OS-2</text><text x="688" y="123" fill="#92400e" font-size="9" text-anchor="middle">:9202</text><text x="642" y="155" fill="#999" font-size="9" text-anchor="middle">opensearch-data-1/2</text><text x="642" y="170" fill="#999" font-size="9" text-anchor="middle">cluster: opensearch-cluster</text><text x="642" y="185" fill="#aaa" font-size="9" text-anchor="middle">security disabled</text><rect width="120" height="56" x="542" y="252" fill="#bbf7d0" stroke="#10b981" stroke-width="1.5" rx="6"/><text x="602" y="274" fill="#065f46" font-size="13" font-weight="700" text-anchor="middle">LB</text><text x="602" y="290" fill="#065f46" font-size="10" text-anchor="middle">HAProxy 2.9</text><text x="602" y="303" fill="#065f46" font-size="9" text-anchor="middle">:5432 write / :5433 read</text><line x1="662" x2="700" y1="266" y2="234" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/><line x1="662" x2="700" y1="280" y2="280" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/><line x1="662" x2="700" y1="294" y2="326" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/><rect width="180" height="180" x="700" y="200" fill="#e9ecef" stroke="#ccc" stroke-width="1.5" rx="6"/><text x="790" y="222" fill="#333" font-size="12" font-weight="700" text-anchor="middle">Patroni / PostgreSQL</text><rect width="152" height="32" x="714" y="230" fill="#bbf7d0" stroke="#059669" stroke-width="1.2" rx="4"/><text x="790" y="248" fill="#065f46" font-size="11" font-weight="700" text-anchor="middle">postgres-1 (primary*)</text><rect width="152" height="32" x="714" y="270" fill="#dee2e6" stroke="#ccc" stroke-width="1.2" rx="4"/><text x="790" y="288" fill="#555" font-size="11" text-anchor="middle">postgres-2 (replica)</text><rect width="152" height="32" x="714" y="310" fill="#dee2e6" stroke="#ccc" stroke-width="1.2" rx="4"/><text x="790" y="328" fill="#555" font-size="11" text-anchor="middle">postgres-3 (replica)</text><text x="790" y="368" fill="#999" font-size="9" text-anchor="middle">Spilo-15 | sync replication</text><rect width="180" height="48" x="700" y="415" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5" rx="6"/><text x="790" y="436" fill="#3730a3" font-size="12" font-weight="700" text-anchor="middle">etcd v3.5</text><text x="790" y="452" fill="#3730a3" font-size="9" text-anchor="middle">leader election / DCS :2379</text><line x1="790" x2="790" y1="382" y2="413" stroke="#6366f1" stroke-dasharray="4 3" stroke-width="1.5" marker-end="url(#arr)"/><rect width="140" height="44" x="542" y="430" fill="#e9ecef" stroke="#ccc" stroke-dasharray="5 3" stroke-width="1.2" rx="6"/><text x="612" y="450" fill="#999" font-size="11" text-anchor="middle">NAS</text><text x="612" y="465" fill="#999" font-size="9" text-anchor="middle">no cluster needed</text><text x="612" y="489" fill="#bbb" font-size="8" text-anchor="middle">(shared ivy volumes)</text><rect width="276" height="38" x="178" y="430" fill="#e9ecef" stroke="#ddd" stroke-width="1" rx="4"/><text x="316" y="447" fill="#888" font-size="9" text-anchor="middle">Shared volumes: ivy-applications, ivy-configuration</text><text x="316" y="460" fill="#888" font-size="9" text-anchor="middle">Per-node: ivy-data-1, ivy-data-2</text><text x="542" y="330" fill="#065f46" font-size="9" text-anchor="middle">stats UI :8404</text><rect width="500" height="72" x="14" y="530" fill="#e9ecef" stroke="#ddd" stroke-width="1" rx="4"/><text x="24" y="548" fill="#333" font-size="10" font-weight="700">Legend</text><rect width="12" height="10" x="24" y="556" fill="#bfdbfe" stroke="#3b82f6" rx="2"/><text x="40" y="566" fill="#555" font-size="10">HTTP LB (Apache)</text><rect width="12" height="10" x="130" y="556" fill="#ede9fe" stroke="#8b5cf6" rx="2"/><text x="146" y="566" fill="#555" font-size="10">Axon Ivy engines</text><rect width="12" height="10" x="254" y="556" fill="#bbf7d0" stroke="#10b981" rx="2"/><text x="270" y="566" fill="#555" font-size="10">PostgreSQL / HAProxy</text><rect width="12" height="10" x="390" y="556" fill="#fde68a" stroke="#d97706" rx="2"/><text x="406" y="566" fill="#555" font-size="10">OpenSearch</text><rect width="12" height="10" x="24" y="575" fill="#e0e7ff" stroke="#6366f1" rx="2"/><text x="40" y="585" fill="#555" font-size="10">etcd (DCS)</text><line x1="130" x2="150" y1="580" y2="580" stroke="#ef4444" stroke-dasharray="4 3" stroke-width="1.5"/><text x="155" y="585" fill="#555" font-size="10">ivy-scaling boundary</text><text x="270" y="585" fill="#999" font-size="9">* primary elected dynamically by Patroni</text></svg>