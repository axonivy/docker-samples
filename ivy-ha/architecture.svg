<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" role="img" font-family="monospace, sans-serif" font-size="12">
  <title>Ivy Scaling Architecture</title>
  <desc>Architecture diagram showing user → Apache LB → Ivy cluster and OpenSearch cluster → HAProxy → 3-node Patroni PostgreSQL cluster with etcd</desc>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="900" height="620" fill="#f8f9fa" rx="8"/>

  <!-- Zone labels -->
  <text x="14" y="22" font-size="10" fill="#999" font-weight="600" text-anchor="start">ENTRY</text>
  <text x="200" y="22" font-size="10" fill="#999" font-weight="600" text-anchor="start">IVY-SCALING (red circle)</text>
  <text x="560" y="22" font-size="10" fill="#999" font-weight="600" text-anchor="start">BACKEND SERVICES</text>

  <!-- Vertical dividers -->
  <line x1="170" y1="30" x2="170" y2="600" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="530" y1="30" x2="530" y2="600" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- USER -->
  <circle cx="70" cy="280" r="22" fill="#e9ecef" stroke="#ccc" stroke-width="1.5"/>
  <text x="70" y="275" text-anchor="middle" fill="#333" font-size="18">&#128100;</text>
  <text x="70" y="318" text-anchor="middle" fill="#555" font-size="11">User</text>

  <!-- Arrow: user → apache LB -->
  <line x1="93" y1="280" x2="175" y2="280" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="134" y="273" text-anchor="middle" fill="#999" font-size="10">:80</text>

  <!-- APACHE LB box -->
  <rect x="178" y="252" width="120" height="56" rx="6" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="238" y="274" text-anchor="middle" fill="#1d4ed8" font-weight="700" font-size="13">LB</text>
  <text x="238" y="290" text-anchor="middle" fill="#1d4ed8" font-size="10">Apache httpd</text>
  <text x="238" y="303" text-anchor="middle" fill="#1d4ed8" font-size="9">mod_proxy_balancer</text>

  <!-- Red circle (ivy-scaling highlight) -->
  <ellipse cx="375" cy="280" rx="135" ry="100" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="375" y="165" text-anchor="middle" fill="#ef4444" font-size="11" font-style="italic">ivy-scaling</text>

  <!-- Arrow: LB → ivy-1 -->
  <line x1="298" y1="268" x2="340" y2="238" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Arrow: LB → ivy-2 -->
  <line x1="298" y1="292" x2="340" y2="322" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="310" y="285" text-anchor="middle" fill="#999" font-size="9">sticky</text>
  <text x="310" y="295" text-anchor="middle" fill="#999" font-size="9">ROUTEID</text>

  <!-- IVY-1 -->
  <rect x="342" y="210" width="112" height="48" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="398" y="231" text-anchor="middle" fill="#6d28d9" font-weight="700" font-size="12">Axon Ivy 1</text>
  <text x="398" y="249" text-anchor="middle" fill="#6d28d9" font-size="10">:8080  route=1</text>

  <!-- IVY-2 -->
  <rect x="342" y="300" width="112" height="48" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="398" y="321" text-anchor="middle" fill="#6d28d9" font-weight="700" font-size="12">Axon Ivy 2</text>
  <text x="398" y="339" text-anchor="middle" fill="#6d28d9" font-size="10">:8080  route=2</text>

  <!-- Arrow: ivy → postgres-lb -->
  <line x1="454" y1="234" x2="540" y2="280" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="454" y1="324" x2="540" y2="290" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow: apache LB → opensearch (dashed) -->
  <line x1="238" y1="252" x2="238" y2="130" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="238" y1="130" x2="596" y2="130" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="415" y="122" text-anchor="middle" fill="#3b82f6" font-size="9">/opensearch &#8594; round-robin</text>

  <!-- OPENSEARCH cluster box -->
  <rect x="542" y="60" width="200" height="140" rx="6" fill="#e9ecef" stroke="#ccc" stroke-width="1.5"/>
  <text x="642" y="82" text-anchor="middle" fill="#333" font-weight="700" font-size="12">OpenSearch Cluster</text>
  <!-- OS-1 -->
  <rect x="558" y="93" width="76" height="36" rx="4" fill="#fde68a" stroke="#d97706" stroke-width="1.2"/>
  <text x="596" y="109" text-anchor="middle" fill="#92400e" font-weight="700" font-size="11">OS-1</text>
  <text x="596" y="123" text-anchor="middle" fill="#92400e" font-size="9">:9201</text>
  <!-- OS-2 -->
  <rect x="650" y="93" width="76" height="36" rx="4" fill="#fde68a" stroke="#d97706" stroke-width="1.2"/>
  <text x="688" y="109" text-anchor="middle" fill="#92400e" font-weight="700" font-size="11">OS-2</text>
  <text x="688" y="123" text-anchor="middle" fill="#92400e" font-size="9">:9202</text>
  <text x="642" y="155" text-anchor="middle" fill="#999" font-size="9">opensearch-data-1/2</text>
  <text x="642" y="170" text-anchor="middle" fill="#999" font-size="9">cluster: opensearch-cluster</text>
  <text x="642" y="185" text-anchor="middle" fill="#aaa" font-size="9">security disabled</text>

  <!-- HAPROXY LB -->
  <rect x="542" y="252" width="120" height="56" rx="6" fill="#bbf7d0" stroke="#10b981" stroke-width="1.5"/>
  <text x="602" y="274" text-anchor="middle" fill="#065f46" font-weight="700" font-size="13">LB</text>
  <text x="602" y="290" text-anchor="middle" fill="#065f46" font-size="10">HAProxy 2.9</text>
  <text x="602" y="303" text-anchor="middle" fill="#065f46" font-size="9">:5432 write / :5433 read</text>

  <!-- Arrow: haproxy → pg nodes -->
  <line x1="662" y1="266" x2="700" y2="234" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="662" y1="280" x2="700" y2="280" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="662" y1="294" x2="700" y2="326" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PG cluster box -->
  <rect x="700" y="200" width="180" height="180" rx="6" fill="#e9ecef" stroke="#ccc" stroke-width="1.5"/>
  <text x="790" y="222" text-anchor="middle" fill="#333" font-weight="700" font-size="12">Patroni / PostgreSQL</text>
  <!-- pg-1 -->
  <rect x="714" y="230" width="152" height="32" rx="4" fill="#bbf7d0" stroke="#059669" stroke-width="1.2"/>
  <text x="790" y="248" text-anchor="middle" fill="#065f46" font-weight="700" font-size="11">postgres-1  (primary*)</text>
  <!-- pg-2 -->
  <rect x="714" y="270" width="152" height="32" rx="4" fill="#dee2e6" stroke="#ccc" stroke-width="1.2"/>
  <text x="790" y="288" text-anchor="middle" fill="#555" font-size="11">postgres-2  (replica)</text>
  <!-- pg-3 -->
  <rect x="714" y="310" width="152" height="32" rx="4" fill="#dee2e6" stroke="#ccc" stroke-width="1.2"/>
  <text x="790" y="328" text-anchor="middle" fill="#555" font-size="11">postgres-3  (replica)</text>
  <text x="790" y="368" text-anchor="middle" fill="#999" font-size="9">Spilo-15  |  sync replication</text>

  <!-- ETCD -->
  <rect x="700" y="415" width="180" height="48" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="790" y="436" text-anchor="middle" fill="#3730a3" font-weight="700" font-size="12">etcd v3.5</text>
  <text x="790" y="452" text-anchor="middle" fill="#3730a3" font-size="9">leader election / DCS  :2379</text>

  <!-- Arrow: pg cluster ↔ etcd -->
  <line x1="790" y1="382" x2="790" y2="413" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- NAS note -->
  <rect x="542" y="430" width="140" height="44" rx="6" fill="#e9ecef" stroke="#ccc" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="612" y="450" text-anchor="middle" fill="#999" font-size="11">NAS</text>
  <text x="612" y="465" text-anchor="middle" fill="#999" font-size="9">no cluster needed</text>
  <text x="612" y="489" text-anchor="middle" fill="#bbb" font-size="8">(shared ivy volumes)</text>

  <!-- Shared ivy volumes annotation -->
  <rect x="178" y="430" width="276" height="38" rx="4" fill="#e9ecef" stroke="#ddd" stroke-width="1"/>
  <text x="316" y="447" text-anchor="middle" fill="#888" font-size="9">Shared volumes: ivy-applications, ivy-configuration</text>
  <text x="316" y="460" text-anchor="middle" fill="#888" font-size="9">Per-node: ivy-data-1, ivy-data-2</text>

  <!-- HAProxy stats annotation -->
  <text x="542" y="330" text-anchor="middle" fill="#065f46" font-size="9">stats UI :8404</text>

  <!-- Legend -->
  <rect x="14" y="530" width="500" height="72" rx="4" fill="#e9ecef" stroke="#ddd" stroke-width="1"/>
  <text x="24" y="548" fill="#333" font-weight="700" font-size="10">Legend</text>
  <rect x="24" y="556" width="12" height="10" rx="2" fill="#bfdbfe" stroke="#3b82f6"/>
  <text x="40" y="566" fill="#555" font-size="10">HTTP LB (Apache)</text>
  <rect x="130" y="556" width="12" height="10" rx="2" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="146" y="566" fill="#555" font-size="10">Axon Ivy engines</text>
  <rect x="254" y="556" width="12" height="10" rx="2" fill="#bbf7d0" stroke="#10b981"/>
  <text x="270" y="566" fill="#555" font-size="10">PostgreSQL / HAProxy</text>
  <rect x="390" y="556" width="12" height="10" rx="2" fill="#fde68a" stroke="#d97706"/>
  <text x="406" y="566" fill="#555" font-size="10">OpenSearch</text>
  <rect x="24" y="575" width="12" height="10" rx="2" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="40" y="585" fill="#555" font-size="10">etcd (DCS)</text>
  <line x1="130" y1="580" x2="150" y2="580" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="155" y="585" fill="#555" font-size="10">ivy-scaling boundary</text>
  <text x="270" y="585" fill="#999" font-size="9">* primary elected dynamically by Patroni</text>
</svg>
